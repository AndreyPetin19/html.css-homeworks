<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smell Cool</title>
    <link rel="stylesheet" href="secondlessoln.css">
</head>

<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">Smell Cool</div>

        <nav class="nav">
            <a href="#">About</a>
            <a href="#">Main</a>
            <a href="#">Catalog</a>
            <a href="#">Settings</a>
        </nav>

        <div class="header-right">
            <div class="icons">
                <span>🌐</span>
                <span>👤</span>
            </div>
            <button class="btn">Sign in / Sign Up</button>
        </div>
    </div>
</header>

<main>

<section class="hero">
    <div class="hero-content">
        <h1>Каталог</h1>
        <p>Духи и косметические продукты премиум качества</p>
    </div>
</section>

<section class="catalog container">
    <div class="product-grid">

        <div class="product-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTaWRaXtEifv5eRXqD-i3sIhzImaqFIkA8moQ&s" alt="Продукт 1">
            <h3>Boss Infinite</h3>
            <button class="btn">Купить</button>
        </div>

        <div class="product-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhoWmnzk1KB9XAW-9XEx0p0Fo2WW3Ll75wWA&s" alt="Продукт 2">
            <h3>Luxury Perfume</h3>
            <button class="btn">Купить</button>
        </div>

    </div>
</section>

</main>

<footer class="footer">
    <div class="container footer-inner">
        <div class="footer-logo">Smell Cool</div>
        <p>Contact: +7 777 123 45 67</p>
    </div>
</footer>

</body>
</html>
