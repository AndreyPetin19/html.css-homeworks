<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="container">
                <div class="logo">StayFinder</div>
                <div class="menu">
                    <a href="#">Главная</a>
                    <a href="#">Избранное</a>
                    <a href="#">Войти</a>
                </div>
        </div>
    </div>
<div class="search">
    <div class="container">
        <input type="text" placeholder="Город">
        <input type="date">
        <input type="date">
        <select>
            <option>1 гость</option>
            <option>2 гостя</option>
        </select>
        <button>Найти</button>
    </div>
</div>
<div class="main">
    <div class="container">

        <div class="filters">
            <h3>Фильтры</h3>
            <label><input type="checkbox"> Wi-Fi</label><br>
            <label><input type="checkbox"> Завтрак</label><br>
            <label><input type="checkbox"> Парковка</label>
        </div>
 <div class="cards">

            <div class="card">
                <div class="img-box">
                  <img height="200px" width="300px" src="https://minio.kyivcity.gov.ua/portal-guide/places/SKCZYhfMa4cwb0DvL59Fj8nNptrvQRf4wahpHYo5.jpeg"
                    alt="City Hotel">
                        </div>
                    <h3>City Hotel</h3>
                    <p>Центр города</p>
                    <p>42 000 ₸ / ночь</p>
                    <a class="btn-link" href="hotel1.html">Подробнее</a>
                    <p class="rating">⭐ 9.0</p>
                    </div>
            <div class="card">
                <img width="300px" src="https://www.cyprusparadise.com/media/1353/3-mountain-view-hotel-outside.jpg?anchor=center&mode=crop&width=1090&height=727&rnd=131624901980000000&quality=30" 
                 alt="mountain-view-hotel">
                <h3>Mountain View</h3>
                <p>Вид на горы</p>
                <p>55 000 ₸ / ночь</p>
                <a class="btn-link" href="hotel2.html">Подробнее</a>
                <p class="rating">⭐ 8.7</p>
            </div>

            <div class="card">
                
                <img width="300px" src="https://cf.bstatic.com/xdata/images/hotel/max500/761013482.jpg?k=a699a4b0a7b2b3307afc2555c3824b0fd56066c8b1ac2c16afefce260e7b0d7b&o=&hp=1" 
                alt="comfort stay hotel">
                <h3>Comfort Stay</h3>
                <p>Рядом с метро</p>
                <p>38 000 ₸ / ночь</p>
                <a class="btn-link" href="hotel3.html">Подробнее</a>
                <p class="rating">⭐ 8.5</p>
            </div>
        </div>
    </div>    
</div>
<div class="footer">
    <div class="container">
        © 2026 StayFinder
    </div>
</div>
</body>
</html>
