<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Network</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- LEFT SIDEBAR -->
    <aside class="leftbar">
      <div class="logo-card">
        <img
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=800&q=80"
          alt="logo"
        />
        <div class="logo-text">Social Network</div>
      </div>

      <nav class="nav">
        <a href="#" class="nav-btn">⌂</a>
        <a href="#" class="nav-btn">👥</a>
        <a href="#" class="nav-btn">🔖</a>
        <a href="#" class="nav-btn">⚙</a>
      </nav>

      <a href="#" class="nav-btn out-btn">↩</a>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="main-header">
        <input type="search" placeholder="Search" />
        <div class="header-actions">
          <div class="header-icon">💬</div>
          <div class="header-icon">🔔</div>
        </div>
      </div>

      <h1 class="title">Feed</h1>

      <section class="post-card">
        <div class="post-top">
          <div class="post-user">
            <img
              src="https://randomuser.me/api/portraits/men/32.jpg"
              alt="user"
            />
            <div class="post-user-name">eduard</div>
          </div>

          <div class="post-menu">•••</div>
        </div>

        <div class="post-image-wrap">
          <img
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1400&q=80"
            alt="mountains"
          />
        </div>

        <div class="post-bottom">
          <div class="post-actions">
            <span>♡</span>
            <span>💬</span>
            <span>↗</span>
          </div>

          <p class="post-caption">Beautiful mountains</p>

          <div class="post-time">14:01 - 19.02.2026</div>
        </div>
      </section>
    </main>

    <!-- RIGHT SIDEBAR -->
    <aside class="rightbar">
      <div class="direct-header">
        <div class="profile">
          <img
            src="https://randomuser.me/api/portraits/men/45.jpg"
            alt="profile"
          />
          <div class="profile-info">
            <h3>Eduard</h3>
            <p>@eduard</p>
          </div>
        </div>

        <h2 class="direct-title">Direct</h2>
      </div>

      <div class="chat-list">
        <div class="chat-item">
          <img src="https://randomuser.me/api/portraits/men/11.jpg" alt="Alex" />
          <div class="chat-info">
            <h4>Alex</h4>
            <p>online</p>
          </div>
          <span class="status online"></span>
        </div>

        <div class="chat-item">
          <img src="https://randomuser.me/api/portraits/men/12.jpg" alt="Daniel" />
          <div class="chat-info">
            <h4>Daniel</h4>
            <p>5 min ago</p>
          </div>
          <span class="status offline"></span>
        </div>

        <div class="chat-item">
          <img src="https://randomuser.me/api/portraits/women/13.jpg" alt="Sophie" />
          <div class="chat-info">
            <h4>Sophie</h4>
            <p>online</p>
          </div>
          <span class="status online"></span>
        </div>

        <div class="chat-item">
          <img src="https://randomuser.me/api/portraits/men/14.jpg" alt="Chris" />
          <div class="chat-info">
            <h4>Chris</h4>
            <p>12 min ago</p>
          </div>
          <span class="status offline"></span>
        </div>

        <div class="chat-item">
          <img src="https://randomuser.me/api/portraits/women/15.jpg" alt="Emma" />
          <div class="chat-info">
            <h4>Emma</h4>
            <p>online</p>
          </div>
          <span class="status online"></span>
        </div>

        <div class="chat-item">
          <img src="https://randomuser.me/api/portraits/men/16.jpg" alt="Kevin" />
          <div class="chat-info">
            <h4>Kevin</h4>
            <p>1 hour ago</p>
          </div>
          <span class="status offline"></span>
        </div>
      </div>
    </aside>

  </div>
</body>
</html>
