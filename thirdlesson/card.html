<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cardstyle.css">
</head>

<body>
    <div class="card">
        <div class="leftside">
            <img src="" alt="">
        </div>
        <div class="rightside">
            <div class="header">
                <h1></h1>
                <p></p>
            </div>
            <div class="tooltip">
                <p>moon</p>
                <p>Neil</p>
                <p>trancformer</p>
            </div>

            <div class="card-content">
                <div>
                    <h2>The Moon — Earth's Closest Neighbor</h2>

                        The Moon is Earth's only natural satellite and the fifth largest moon in the Solar System.
                        It influences tides and has fascinated humanity for centuries.
                    </p>

                    <div class="stars">
                        ★ ★ ★ ★ ☆
                    </div>
                    <div class="footer">
                        <div class="btn">
                            <button>more</button>
                        </div>
                        <div class="btn-2">

                        </div>
                    </div>
                </div>


            </div>
        </div>
