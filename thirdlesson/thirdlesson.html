<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon card</title>

    <style>
       * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Serge UI', sans-serif;
        }
    body {
        height: 1000px;
        display:flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);

    }
    card{
        width: 600px;
        background: rgba(20, 20, 30, 0.9);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        display: flex;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        transition: 0.3;
    }
    .card:hover {
        transform: scale(1.03);
    }
    .card-image {
        width: 45%;
        background:url(https://images.squarespace-cdn.com/content/v1/606c19ed2f277851e3ab71fa/8c445b8f-2cb0-4d8c-939b-6cc140c5df6e/moon.jpg) center/cover no-repeat;
    }
    .card-content {
        padding: 30px;
        width: 55%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }
    .card-content h2{
        font-size: 22px;
        margin-bottom: 15px;
    }
    .card-content p{
        font-size: 14px;
        color: #ccc;
        margin-bottom: 20px;
        line-height: 1.6;
    }
    .stars {
        margin-bottom: 20px;
        color: gold;
        font-size: 18px;
    }
    buttons {
        display: flex;
        gap: 10px;
    }

    .btn {
        padding: 8px 18px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .btn-outline {
        background: transparent;
        border: 1px solid #aaa;
        color: #fff;
    }

    .btn-outline:hover {
        background: #fff;
        color: #000;
    }

    .btn-primary {
        background: #00d4ff;
        color: #000;
        font-weight: bold;
    }

    .btn-primary:hover {
        background: #00aacc;
    }

    @media (max-width: 700px) {
        .card {
            flex-direction: column;
            width: 90%;
        }
        .card-image {
            height: 200px;
            width: 100%;
        }
        .card-content {
            width: 100%;
        }
    }
    </style>
</head>
<body>
    <div class="card">
    <div class="card-image"></div>

    <div class="card-content">
        <div>
            <h2>The Moon — Earth's Closest Neighbor</h2>
            <p>
                The Moon is Earth's only natural satellite and the fifth largest moon in the Solar System. 
                It influences tides and has fascinated humanity for centuries.
            </p>

            <div class="stars">
                ★ ★ ★ ★ ☆
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-outline">More</button>
            <button class="btn btn-primary">Explore</button>
        </div>
    </div>
</div>
</body>
</html>
